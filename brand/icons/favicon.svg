<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Subvoy favicon">
  <!-- Scalable favicon — works at 16×16, 32×32, 48×48 -->
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#fg)"/>
  <!-- Simplified S-mark: two overlapping rounded rects suggesting cards -->
  <rect x="8" y="7" width="16" height="10" rx="2.5" fill="white" fill-opacity="0.35" transform="rotate(-6 16 12)"/>
  <rect x="7" y="12" width="16" height="10" rx="2.5" fill="white"/>
  <rect x="9" y="14.5" width="5" height="3.5" rx="1" fill="#C7D2FE"/>
  <!-- Cycle dot -->
  <circle cx="23" cy="9" r="4.5" fill="#312E81" fill-opacity="0.9"/>
  <path d="M 23 5.5 A 3.5 3.5 0 1 1 19.8 11.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M 18.8 10.3 L 19.8 11.5 L 21.3 10.8" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
