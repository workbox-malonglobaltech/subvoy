<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Subvoy symbol">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)"/>

  <!-- Back card (offset, lower opacity) -->
  <rect x="19" y="15" width="30" height="19" rx="4.5" fill="white" fill-opacity="0.28" transform="rotate(-5 34 24.5)"/>

  <!-- Front card -->
  <rect x="13" y="23" width="33" height="21" rx="4.5" fill="white"/>

  <!-- Card EMV chip -->
  <rect x="18" y="28" width="8" height="6" rx="1.5" fill="#C7D2FE"/>

  <!-- Card data lines -->
  <rect x="18" y="37" width="22" height="2.5" rx="1.25" fill="#E0E7FF"/>
  <rect x="18" y="41" width="15" height="2.5" rx="1.25" fill="#E0E7FF"/>

  <!-- Circular refresh arrow (subscription cycle) — top right -->
  <circle cx="46" cy="19" r="9" fill="#312E81" fill-opacity="0.85"/>
  <!-- Arc: ~300° starting from top -->
  <path d="M 46 11.5 A 7.5 7.5 0 1 1 39.2 22.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Arrowhead at arc end -->
  <path d="M 37.5 20 L 39.2 22.5 L 42 21.2" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
