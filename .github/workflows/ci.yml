name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (backend)
        run: npx tsc --noEmit
        working-directory: backend

      - name: Typecheck (frontend)
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Test (backend)
        run: npm test --workspace=backend
        env:
          NODE_ENV: test

      - name: Test (frontend)
        run: npm test --workspace=frontend

      - name: Build
        run: npm run build

  # Real-database integration tests — run the genuine migrations + SQL against a
  # Postgres service (the default suite mocks the pool). This is where the data
  # layer, transactions, and money path are actually exercised.
  integration-db:
    name: Integration (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: subvoy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/subvoy_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run migrations
        run: npm run db:migrate --workspace=backend
      - name: Real-DB tests
        run: npm run test:db --workspace=backend
