<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Subvoy — Subscription Manager</title>
    <meta name="description" content="Track every subscription, get reminders before renewals, and pay bills directly from your naira wallet." />
    <meta name="theme-color" content="#4F46E5" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/brand/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="/icons/icon-16.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Subvoy" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph / social -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Subvoy — Subscription Manager" />
    <meta property="og:description" content="Track every subscription, get reminders before renewals, and pay bills directly from your naira wallet." />
    <meta property="og:url"         content="https://subvoy.com" />
    <meta property="og:image"       content="https://subvoy.com/icons/icon-512.png" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Subvoy" />
    <meta name="twitter:description" content="Your subscription hub — track, remind, pay." />
    <meta name="twitter:image"       content="https://subvoy.com/icons/icon-512.png" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
