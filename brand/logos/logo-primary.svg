<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="Subvoy">
  <defs>
    <linearGradient id="sym-grad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- ── Symbol (56×56, same proportions as standalone mark) ── -->
  <rect width="56" height="56" rx="12" fill="url(#sym-grad)"/>

  <!-- Back card -->
  <rect x="16" y="13" width="26" height="17" rx="4" fill="white" fill-opacity="0.28" transform="rotate(-5 29 21.5)"/>

  <!-- Front card -->
  <rect x="11" y="20" width="29" height="18" rx="4" fill="white"/>

  <!-- Card chip -->
  <rect x="15" y="25" width="7" height="5" rx="1.5" fill="#C7D2FE"/>

  <!-- Card lines -->
  <rect x="15" y="32" width="19" height="2" rx="1" fill="#E0E7FF"/>
  <rect x="15" y="36" width="13" height="2" rx="1" fill="#E0E7FF"/>

  <!-- Refresh circle -->
  <circle cx="40" cy="17" r="8" fill="#312E81" fill-opacity="0.85"/>
  <path d="M 40 10.5 A 6.5 6.5 0 1 1 34 20" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 32.5 17.8 L 34 20 L 36.5 18.8" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Wordmark ── -->
  <!-- "Sub" — regular weight -->
  <text
    x="70"
    y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="400"
    letter-spacing="-0.5"
    fill="#111827"
  >Sub</text>
  <!-- "voy" — bold weight -->
  <text
    x="109"
    y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#4F46E5"
  >voy</text>
</svg>
