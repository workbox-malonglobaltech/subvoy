<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Subvoy — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #F3F4F6;
      color: #111827;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #4F46E5;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }
    .logo span { font-weight: 400; color: #111827; }

    .icon-wrap {
      width: 80px;
      height: 80px;
      background: #EEF2FF;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px;
    }

    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 32px;
    }

    button {
      background: #4F46E5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4338CA; }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="logo"><span>Sub</span>voy</div>

  <div class="icon-wrap">
    <svg width="40" height="40" fill="none" stroke="#4F46E5" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01M4.929 7.929a10 10 0 0114.142 0M1.464 4.929A15 15 0 0122.536 4.93"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>
    Subvoy needs a connection to load your subscriptions.
    Check your network and try again.
  </p>

  <button onclick="window.location.reload()">
    Try again
  </button>

  <p class="hint">Your data is safe — we'll sync when you're back online.</p>
</body>
</html>
