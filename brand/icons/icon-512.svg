<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Subvoy 512px icon">
  <defs>
    <linearGradient id="g512" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="chip512" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#3730A3" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#g512)"/>

  <!-- Top sheen -->
  <rect width="512" height="256" rx="112" fill="white" fill-opacity="0.05"/>

  <!-- Back card (rotated) -->
  <rect x="136" y="104" width="258" height="162" rx="36"
        fill="white" fill-opacity="0.22"
        transform="rotate(-6 265 185)"/>

  <!-- Front card with shadow -->
  <rect x="104" y="176" width="268" height="168" rx="36"
        fill="white" filter="url(#card-shadow)"/>

  <!-- EMV chip body -->
  <rect x="140" y="216" width="72" height="52" rx="10" fill="url(#chip512)"/>
  <!-- Chip contact lines horizontal -->
  <line x1="140" y1="234" x2="212" y2="234" stroke="#818CF8" stroke-width="2.5"/>
  <line x1="140" y1="242" x2="212" y2="242" stroke="#818CF8" stroke-width="2.5"/>
  <!-- Chip contact lines vertical -->
  <line x1="158" y1="216" x2="158" y2="268" stroke="#818CF8" stroke-width="2.5"/>
  <line x1="176" y1="216" x2="176" y2="268" stroke="#818CF8" stroke-width="2.5"/>
  <line x1="194" y1="216" x2="194" y2="268" stroke="#818CF8" stroke-width="2.5"/>
  <!-- Chip center square -->
  <rect x="162" y="228" width="28" height="18" rx="3" fill="#E0E7FF" fill-opacity="0.6"/>

  <!-- Card number dots — 4 groups -->
  <circle cx="248" cy="244" r="7" fill="#E0E7FF"/>
  <circle cx="268" cy="244" r="7" fill="#E0E7FF"/>
  <circle cx="288" cy="244" r="7" fill="#E0E7FF"/>
  <circle cx="308" cy="244" r="7" fill="#E0E7FF"/>

  <circle cx="336" cy="244" r="7" fill="#C7D2FE"/>
  <circle cx="356" cy="244" r="7" fill="#C7D2FE"/>

  <!-- Card data lines -->
  <rect x="140" y="296" width="192" height="18" rx="9" fill="#E0E7FF"/>
  <rect x="140" y="322" width="134" height="14" rx="7" fill="#EEF2FF"/>

  <!-- Refresh / subscription cycle badge -->
  <circle cx="368" cy="144" r="80" fill="#1E1B4B"/>
  <circle cx="368" cy="144" r="76" fill="none" stroke="#4338CA" stroke-width="3"/>

  <!-- Arc ~300° sweep -->
  <path d="M 368 72 A 72 72 0 1 1 306 211"
        stroke="white" stroke-width="16" fill="none"
        stroke-linecap="round"/>

  <!-- Arrowhead -->
  <path d="M 288 196 L 306 211 L 318 190"
        stroke="white" stroke-width="16" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
