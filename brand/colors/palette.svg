<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Subvoy color palette">

  <!-- ─── Background ─── -->
  <rect width="760" height="520" fill="#F8F8FC" rx="16"/>

  <!-- ═══════════════════════════════════════════════
       TITLE
  ═══════════════════════════════════════════════ -->
  <text x="36" y="48" font-size="22" font-weight="700" fill="#111827">Subvoy — Colour Palette</text>
  <text x="36" y="68" font-size="12" fill="#6B7280">Official brand colours · v1.0 · 2026</text>

  <!-- ═══════════════════════════════════════════════
       ROW 1: PRIMARY (Indigo)
  ═══════════════════════════════════════════════ -->
  <text x="36" y="104" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">PRIMARY — INDIGO</text>

  <!-- Indigo-300 -->
  <rect x="36"   y="114" width="110" height="72" rx="10" fill="#A5B4FC"/>
  <text x="91"   y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#3730A3">Indigo 300</text>
  <text x="91"   y="164" text-anchor="middle" font-size="9"  fill="#3730A3">#A5B4FC</text>

  <!-- Indigo-400 -->
  <rect x="158"  y="114" width="110" height="72" rx="10" fill="#818CF8"/>
  <text x="213"  y="150" text-anchor="middle" font-size="10" font-weight="600" fill="white">Indigo 400</text>
  <text x="213"  y="164" text-anchor="middle" font-size="9"  fill="white">#818CF8</text>

  <!-- Indigo-600 (brand primary) -->
  <rect x="280"  y="114" width="110" height="72" rx="10" fill="#4F46E5"/>
  <text x="335"  y="144" text-anchor="middle" font-size="10" font-weight="700" fill="white">Indigo 600</text>
  <text x="335"  y="158" text-anchor="middle" font-size="9"  fill="#C7D2FE">BRAND PRIMARY</text>
  <text x="335"  y="171" text-anchor="middle" font-size="9"  fill="white">#4F46E5</text>

  <!-- Indigo-700 -->
  <rect x="402"  y="114" width="110" height="72" rx="10" fill="#4338CA"/>
  <text x="457"  y="150" text-anchor="middle" font-size="10" font-weight="600" fill="white">Indigo 700</text>
  <text x="457"  y="164" text-anchor="middle" font-size="9"  fill="#C7D2FE">#4338CA</text>

  <!-- Indigo-900 -->
  <rect x="524"  y="114" width="110" height="72" rx="10" fill="#312E81"/>
  <text x="579"  y="150" text-anchor="middle" font-size="10" font-weight="600" fill="white">Indigo 900</text>
  <text x="579"  y="164" text-anchor="middle" font-size="9"  fill="#A5B4FC">#312E81</text>

  <!-- Indigo-950 -->
  <rect x="646"  y="114" width="78"  height="72" rx="10" fill="#1E1B4B"/>
  <text x="685"  y="150" text-anchor="middle" font-size="10" font-weight="600" fill="white">Indigo 950</text>
  <text x="685"  y="164" text-anchor="middle" font-size="9"  fill="#818CF8">#1E1B4B</text>

  <!-- ═══════════════════════════════════════════════
       ROW 2: GRADIENT
  ═══════════════════════════════════════════════ -->
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <text x="36" y="218" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">BRAND GRADIENT</text>

  <rect x="36" y="228" width="310" height="60" rx="10" fill="url(#brandGrad)"/>
  <text x="191" y="253" text-anchor="middle" font-size="11" font-weight="700" fill="white">Primary Gradient</text>
  <text x="191" y="270" text-anchor="middle" font-size="9"  fill="#E0E7FF">#818CF8 → #4338CA · 135°</text>

  <!-- ═══════════════════════════════════════════════
       ROW 2: SEMANTIC COLOURS
  ═══════════════════════════════════════════════ -->
  <text x="370" y="218" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">SEMANTIC</text>

  <!-- Success -->
  <rect x="370" y="228" width="86" height="60" rx="10" fill="#10B981"/>
  <text x="413"  y="253" text-anchor="middle" font-size="10" font-weight="600" fill="white">Success</text>
  <text x="413"  y="268" text-anchor="middle" font-size="9"  fill="#D1FAE5">#10B981</text>

  <!-- Warning -->
  <rect x="466" y="228" width="86" height="60" rx="10" fill="#F59E0B"/>
  <text x="509"  y="253" text-anchor="middle" font-size="10" font-weight="600" fill="white">Warning</text>
  <text x="509"  y="268" text-anchor="middle" font-size="9"  fill="#FEF3C7">#F59E0B</text>

  <!-- Danger -->
  <rect x="562" y="228" width="86" height="60" rx="10" fill="#EF4444"/>
  <text x="605"  y="253" text-anchor="middle" font-size="10" font-weight="600" fill="white">Danger</text>
  <text x="605"  y="268" text-anchor="middle" font-size="9"  fill="#FEE2E2">#EF4444</text>

  <!-- Info -->
  <rect x="658" y="228" width="66" height="60" rx="10" fill="#3B82F6"/>
  <text x="691"  y="253" text-anchor="middle" font-size="10" font-weight="600" fill="white">Info</text>
  <text x="691"  y="268" text-anchor="middle" font-size="9"  fill="#DBEAFE">#3B82F6</text>

  <!-- ═══════════════════════════════════════════════
       ROW 3: NEUTRALS
  ═══════════════════════════════════════════════ -->
  <text x="36" y="320" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">NEUTRALS — GRAY</text>

  <rect x="36"  y="330" width="76" height="52" rx="10" fill="#111827"/>
  <text x="74"  y="355" text-anchor="middle" font-size="9" font-weight="600" fill="white">Gray 900</text>
  <text x="74"  y="368" text-anchor="middle" font-size="8" fill="#9CA3AF">#111827</text>

  <rect x="122" y="330" width="76" height="52" rx="10" fill="#374151"/>
  <text x="160" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="white">Gray 700</text>
  <text x="160" y="368" text-anchor="middle" font-size="8" fill="#D1D5DB">#374151</text>

  <rect x="208" y="330" width="76" height="52" rx="10" fill="#6B7280"/>
  <text x="246" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="white">Gray 500</text>
  <text x="246" y="368" text-anchor="middle" font-size="8" fill="#F3F4F6">#6B7280</text>

  <rect x="294" y="330" width="76" height="52" rx="10" fill="#9CA3AF"/>
  <text x="332" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="white">Gray 400</text>
  <text x="332" y="368" text-anchor="middle" font-size="8" fill="#374151">#9CA3AF</text>

  <rect x="380" y="330" width="76" height="52" rx="10" fill="#D1D5DB"/>
  <text x="418" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">Gray 300</text>
  <text x="418" y="368" text-anchor="middle" font-size="8" fill="#6B7280">#D1D5DB</text>

  <rect x="466" y="330" width="76" height="52" rx="10" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="504" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">Gray 200</text>
  <text x="504" y="368" text-anchor="middle" font-size="8" fill="#6B7280">#E5E7EB</text>

  <rect x="552" y="330" width="76" height="52" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
  <text x="590" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="#6B7280">Gray 100</text>
  <text x="590" y="368" text-anchor="middle" font-size="8" fill="#9CA3AF">#F3F4F6</text>

  <rect x="638" y="330" width="86" height="52" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="681" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="#9CA3AF">White</text>
  <text x="681" y="368" text-anchor="middle" font-size="8" fill="#D1D5DB">#FFFFFF</text>

  <!-- ═══════════════════════════════════════════════
       ROW 4: INDIGO TINTS (UI usage)
  ═══════════════════════════════════════════════ -->
  <text x="36" y="412" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">INDIGO TINTS — UI SURFACES</text>

  <rect x="36"  y="422" width="110" height="52" rx="10" fill="#EEF2FF" stroke="#E0E7FF" stroke-width="1"/>
  <text x="91"  y="447" text-anchor="middle" font-size="9" font-weight="600" fill="#4338CA">Indigo 50</text>
  <text x="91"  y="460" text-anchor="middle" font-size="8" fill="#818CF8">#EEF2FF</text>

  <rect x="158" y="422" width="110" height="52" rx="10" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="213" y="447" text-anchor="middle" font-size="9" font-weight="600" fill="#4338CA">Indigo 100</text>
  <text x="213" y="460" text-anchor="middle" font-size="8" fill="#818CF8">#E0E7FF</text>

  <rect x="280" y="422" width="110" height="52" rx="10" fill="#C7D2FE"/>
  <text x="335" y="447" text-anchor="middle" font-size="9" font-weight="600" fill="#3730A3">Indigo 200</text>
  <text x="335" y="460" text-anchor="middle" font-size="8" fill="#4338CA">#C7D2FE</text>

  <!-- Usage notes -->
  <text x="414" y="432" font-size="10" fill="#6B7280">· Indigo 50 / 100 — hover states, pill backgrounds</text>
  <text x="414" y="448" font-size="10" fill="#6B7280">· Indigo 200 — chip highlights, card accents</text>
  <text x="414" y="464" font-size="10" fill="#6B7280">· Indigo 600 — primary CTA buttons</text>
  <text x="414" y="480" font-size="10" fill="#6B7280">· Gradient — icon backgrounds, hero elements</text>

  <!-- Footer -->
  <text x="36"  y="510" font-size="9" fill="#9CA3AF">© 2026 Subvoy · All rights reserved · Internal brand use only</text>
  <text x="724" y="510" text-anchor="end" font-size="9" fill="#9CA3AF">v1.0</text>
</svg>
