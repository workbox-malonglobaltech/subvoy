name: Deploy

# Backend (API) deploy to Fly.io. The frontend deploys separately via Vercel's
# own GitHub integration.
#   push to `staging` -> subvoy-api-staging   (fly.staging.toml)
#   push to `main`    -> subvoy-api-prod       (fly.production.toml)
#
# Required secret: FLY_API_TOKEN (Settings → Secrets, or per-environment).
# Migrations run automatically via each app's [deploy] release_command.
# No-ops with a clear message until FLY_API_TOKEN is set.

on:
  push:
    branches: [staging, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Guard — require FLY_API_TOKEN
        id: guard
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::warning::FLY_API_TOKEN not set for this environment — skipping deploy. Add it to enable."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup flyctl
        if: steps.guard.outputs.ready == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy (staging)
        if: steps.guard.outputs.ready == 'true' && github.ref_name == 'staging'
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy (production)
        if: steps.guard.outputs.ready == 'true' && github.ref_name == 'main'
        run: flyctl deploy --config fly.production.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
